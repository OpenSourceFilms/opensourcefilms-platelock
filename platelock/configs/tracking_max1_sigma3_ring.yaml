# tracking_multikey13.yaml: the tracking-based plate-lock recipe, validated
# end-to-end on the ExampleShot shot (development name "multikey13", user
# verdict PASS 2026-07-03). Run via (from the repo root):
#
#   python -m platelock.run --config platelock/configs/tracking_multikey13.yaml \
#       --out output/run_multikey13 [--export-5k]
#
# This config is a WORKING EXAMPLE for the ExampleShot shot, self-contained
# under data/example_shot/ (copied here from the original dev workspace,
# where the full forensic history/exploration lives).
# All defaults below are the exact settings that produced the validated
# result. For a NEW shot: copy this file, point inputs/masks/bootstrap at the
# new shot's data, and re-sweep cres_blur_sigma (it's shot-dependent).

inputs:
  original: data/example_shot/input/original/ExampleShot_5K8bit_24fps_Pan_RETIMED_01.mp4
  clean:    data/example_shot/input/clean/ExampleShot_WAN2700p_24fps_Pan_RETIMED_01.mp4

working:
  width: 1920          # working resolution width; height derived from source AR
  # (source 5120x2700 -> 1920x1012)

masks:
  # per-frame SAM3 exclusion masks: {dir}/orig_mask_f{fr:04d}.png (actor, real
  # objects, scored on ORIGINAL) and {dir}/clean_mask_f{fr:04d}.png (WAN-invented
  # elements, scored on CLEAN). Generate via platelock.masks + platelock.segmenters
  # .sam3_segmenter for a new shot; this path reuses the ones already built for
  # this shot's RoMa-dense branch.
  dir: data/example_shot/masks

bootstrap:
  # ANY already-solved backward map, used ONLY to transfer keyframe seeds from
  # original-space to clean-space (no new cross-domain matching). On this shot,
  # the RoMa-dense v2 solve. For a brand-new shot with no prior solve, run a
  # single-frame RoMa/GIM match at each keyframe instead and feed that in.
  M: data/example_shot/bootstrap/M_savgol_w7.npy
  cres: data/example_shot/bootstrap/cres_savgol_w7.npy

tracking:
  keyframe_stride: 3              # keyframes = every Nth frame + the last frame
  seed_grid: [80, 45]             # (gx, gy) seed grid per keyframe
  # NEEDS >=48GB VRAM: on a 24GB card CoTracker OOMs at EVERY ladder
  # resolution even at 64x36 seeds (2026-07-12). Run on the RTX 6000-class
  # pod. If it fits comfortably there, next round is stride 2 + 96x54
  # (the project lead-authorized max).
  resolutions:                    # OOM fallback ladder, tried in order
    - [1920, 1012]
    - [1440, 758]
    - [1280, 674]
  min_run: 9                      # drop track segments shorter than this after screening
  temporal_window: 15             # per-track savgol window
  gap_max: 70                     # PCHIP bridge gap limit (frames)
  wiggle_mult: 3.0                # keep track if 2nd-deriv accel median < overall median * this
  liar_screen:
    # per-frame iterative local-consistency screen -- the make-or-break stage.
    # Catches correspondences wrong for only PART of their lifetime, which no
    # track-level aggregate threshold can see (found after 3 other fixes for
    # the same symptom -- hole-pins, occlusion-trust, gap-bridging -- failed).
    neighbors: 13
    threshold_px: 40.0
    iterations: 3
    min_active: 30

reconstruct:
  grid: [256, 134]                 # coarse control lattice (gx, gy)
  neighbors: 384                   # RBF/TPS neighbours
  smoothing: 2.0
  max_anchors: 16000
  boundary: [9, 5]                 # boundary anchor grid pinning residual to ~0 at edge
  affine_thresh: 3.0                # RANSAC reprojection threshold (px)
  hole_pin_stride: 128              # affine-pin virtual anchors on this lattice...
  hole_pin_margin: 100              # ...if further than this from the nearest real anchor
                                    # (prevents unbounded TPS extrapolation in unsupported holes)
  temporal_windows: [15, 11]        # joint M+cres savgol, applied in sequence (w15 then w11)
  cres_blur_sigma: [3.0]                  # FORCED single value (no sweep) - sigma isolation experiment 2026-07-12
                                          # historical optimum on this shot (re-sweep for a new one)
  sigma_check_frames: [0, 68, 115, 120]
  sigma_check_roi: [40, 20, 200, 460]     # used only for the sigma sweep's lock metric

microlock:
  # per-frame anisotropic pixel-lock against the TRUE original (see
  # platelock.tracking.microlock module docstring for the aperture-problem
  # rationale). Pyramid entries are (tiles_x, tiles_y, search_radius_px).
  clamp_px: 14.0
  coarse_grid: [48, 26]            # (cw, ch) correction lattice
  pyramid:
    - [8, 5, 16]
    - [8, 5, 16]
    - [16, 10, 12]
    - [24, 14, 8]
    - [32, 20, 6]
  damping: 0.8
  temporal_window: 5               # savgol window on the correction sequence
  min_match_score: 0.35
  min_tile_std: 3.0
  curvature_gate: 0.02
  hole_dilate_px: 151              # actor-mask dilation defining the microlock zero-anchor hole

hole_fill:
  # method: harmonic (default; per-component Laplace fill from each hole's own
  # boundary - fixes the compositor-reported occlusion wobble, 2026-07-11) or
  # ring_plane (legacy global-plane fill shipped in the original multikey13
  # deliverable). See platelock.tracking.hole_fill module docstring.
  method: ring_plane               # SHIP-class fill on max1 tracks - never-tested cell
  inner_dilate_px: 61              # trust margin: fill spans mask dilated by this
  solve_downsample: 4              # Laplace solve grid = working res / this
  seam_px: 16                      # distance-transform blend width at the hole rim
  interior_temporal_window: 11     # savgol window on the /4 interior solutions (v3 hybrid)
  interior_ramp_start_px: 24       # px inside the rim where temporal smoothing starts
  interior_ramp_len_px: 90         # ramp length to full interior smoothing
  # --- ring_plane (legacy) parameters ---
  outer_dilate_px: 241
  feather_px: 180
  ring_samples: 4000
  coeff_temporal_window: 9         # savgol window on the plane's 6 coefficients
