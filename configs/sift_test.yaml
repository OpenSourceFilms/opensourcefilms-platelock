mode: sift_test

input:
  resize: none
  frame_range: null
  pixel_format: rgb

methods:
  - sift_homography

sift_homography:
  n_features: 3000
  ratio_threshold: 0.75
  ransac_threshold: 4.0
  min_inliers: 20
  temporal_sigma: 1.5
  do_colour_normalise: true

stmap:
  export: true
  format: npy

metrics:
  compute_lpips: false
  compute_ssim: true
  masked_only: false
  compositing_metrics: true

previews:
  generate: true
  codec: libx264
  crf: 18
  fps: null

output:
  stills_at: [first, middle, last]
  keep_flow_npy: true
